// ── Shared components ──────────────────────────────────────────────

function ScoreBar({ value, color, label }) {
  return (
    <div style={{ flex: 1 }}>
      <div style={{ fontSize: 10, color: "#94A3B8", marginBottom: 4 }}>{label}</div>
      <div style={{ height: 5, background: "#EEECE6", borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: value + "%", height: "100%", background: color, borderRadius: 3 }} />
      </div>
      <div style={{ fontSize: 12, fontWeight: 500, marginTop: 3, color }}>{value}</div>
    </div>
  );
}

function AllocationBar({ alloc }) {
  const total = alloc.reduce((s, a) => s + a.weight, 0);
  return (
    <div style={{ display: "flex", height: 28, borderRadius: 6, overflow: "hidden", gap: 1 }}>
      {alloc.filter(a => a.weight > 0).map((a, i) => (
        <div key={i} title={a.sleeve + ": " + a.etf + " " + a.weight + "%"}
          style={{ width: ((a.weight / total) * 100) + "%", background: a.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, color: "#fff", fontWeight: 700, overflow: "hidden", whiteSpace: "nowrap", minWidth: 0 }}>
          {a.weight >= 12 ? a.weight + "%" : ""}
        </div>
      ))}
    </div>
  );
}

function StatusBadge({ status, label }) {
  const map = { ok: ["#EAF3DE","#3B6D11"], hot: ["#FCEBEB","#A32D2D"], warn: ["#FAEEDA","#854F0B"] };
  const [bg, color] = map[status] || map.ok;
  return <span style={{ fontSize: 10, padding: "2px 7px", borderRadius: 4, fontWeight: 500, background: bg, color }}>{label}</span>;
}

function TrendBadge({ trend }) {
  const map = {
    on:         { bg: "#EAF3DE", color: "#3B6D11", border: "#C0DD97", label: "Trend ON",   icon: "✓" },
    off:        { bg: "#FCEBEB", color: "#A32D2D", border: "#F7C1C1", label: "Trend OFF",  icon: "✗" },
    unverified: { bg: "#FAEEDA", color: "#854F0B", border: "#FAC775", label: "Unverified", icon: "?" },
  };
  const s = map[trend] || map.unverified;
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 10, padding: "2px 7px", borderRadius: 4, fontWeight: 600, background: s.bg, color: s.color, border: "0.5px solid " + s.border, whiteSpace: "nowrap" }}>
      {s.icon} {s.label}
    </span>
  );
}

function VerdictBadge({ verdict, label }) {
  const map = {
    v2wins:   { bg: "#EAF3DE", color: "#3B6D11", border: "#C0DD97" },
    litewins: { bg: "#FAEEDA", color: "#854F0B", border: "#FAC775" },
    similar:  { bg: "#F0EEE8", color: "#5F5E5A", border: "#D3D1C7" },
  };
  const s = map[verdict] || map.similar;
  return (
    <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, fontWeight: 600, background: s.bg, color: s.color, border: "0.5px solid " + s.border, whiteSpace: "nowrap" }}>
      {label}
    </span>
  );
}

          {["ETF", "Wt", "Score", "Trend filter", "Rationale"].map((h, i) => (

            <div style={{ display: "flex", alignItems: "center", gap: 6, minWidth: 0 }}>

            <div style={{ fontSize: 11, fontWeight: 600, color: a.score >= 80 ? "#1D9E75" : a.score >= 65 ? "#BA7517" : "#888", paddingTop: 1 }}>{a.score}</div>
            <div style={{ minWidth: 0 }}>
              <TrendBadge trend={a.trend} />
              <div style={{ fontSize: 9, color: "#B4B2A9", marginTop: 3, lineHeight: 1.4 }}>{a.trendDetail}</div>
            </div>
            <div style={{ fontSize: 11, color: "#6B7B8D", lineHeight: 1.45, paddingTop: 1 }}>{a.rationale}</div>

          <strong style={{ color: "#5F5E5A" }}>Trend filter: </strong>{snap.trendNote}

      <div style={{ background: "#FAEEDA", borderRadius: 8, padding: "12px 14px", marginBottom: 14 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#633806", marginBottom: 6 }}>IC watch items before confirming posture</div>
        {snap.watchItems.map((w, i) => (
          <div key={i} style={{ fontSize: 11, color: "#854F0B", lineHeight: 1.6, paddingLeft: 12, position: "relative" }}>
            <span style={{ position: "absolute", left: 0 }}>·</span>{w}
          </div>
        ))}
      </div>
      <div style={{ fontSize: 9, color: "#B4B2A9", lineHeight: 1.6 }}>Sources: {snap.sources}</div>
    </div>

}

function LiteComparisonView() {
  const [expanded, setExpanded] = useState(null);
  const liteTotal = LITE.alloc.reduce((s, a) => s + a.weight, 0);
  return (
    <div>
      <div style={{ background: "#F5F7FA", border: "0.5px solid #E4E2DA", borderRadius: 10, padding: "14px 16px", marginBottom: 16 }}>
        <div style={{ fontSize: 10, color: "#888", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8 }}>Equity Compass Lite — static construction</div>
        <div style={{ display: "flex", height: 22, borderRadius: 5, overflow: "hidden", gap: 1, marginBottom: 10 }}>
          {LITE.alloc.map((a, i) => (
            <div key={i} style={{ width: ((a.weight / liteTotal) * 100) + "%", background: a.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, color: "#fff", fontWeight: 700 }}>
              {a.weight}%
            </div>
          ))}
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 10 }}>
          {LITE.alloc.map((a, i) => (
            <span key={i} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11 }}>
              <span style={{ width: 8, height: 8, borderRadius: 2, background: a.color, display: "inline-block", flexShrink: 0 }} />
              <strong style={{ color: "#444" }}>{a.label}</strong>
              <span style={{ color: "#94A3B8" }}>{a.ticker} · {a.weight}%</span>
              {a.note && <em style={{ color: "#B4B2A9", fontSize: 10 }}>({a.note})</em>}
            </span>
          ))}
        </div>
        <div style={{ fontSize: 11, color: "#6B7B8D", marginBottom: 10 }}>{LITE.description}</div>
        <div style={{ display: "flex", gap: 8 }}>
          {[{ label: "Holdings", val: LITE.holdings }, { label: "Est. turnover", val: LITE.turnover }, { label: "Avg cost", val: LITE.cost }].map((s, i) => (
            <div key={i} style={{ flex: 1, background: "#fff", borderRadius: 6, padding: "7px 10px", border: "0.5px solid #E4E2DA" }}>
              <div style={{ fontSize: 9, color: "#94A3B8", marginBottom: 2 }}>{s.label}</div>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#1A3A5C" }}>{s.val}</div>
            </div>
          ))}
        </div>
        <div style={{ fontSize: 11, color: "#6B7B8D", marginTop: 10, fontStyle: "italic" }}>{LITE.purpose}</div>
      </div>

      <div style={{ fontSize: 10, color: "#888", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8 }}>Regime-by-regime comparison</div>
      {LITE.regimeComparison.map((row, i) => (
        <div key={i} style={{ border: "0.5px solid #E4E2DA", borderRadius: 10, marginBottom: 8, overflow: "hidden" }}>
          <div onClick={() => setExpanded(expanded === i ? null : i)}
            style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", cursor: "pointer", background: expanded === i ? "#FAFAF8" : "#fff", userSelect: "none" }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#1A3A5C", flex: 1 }}>{row.emoji} {row.regime}</div>
            <VerdictBadge verdict={row.verdict} label={row.verdictLabel} />
            <div style={{ fontSize: 18, color: "#94A3B8", lineHeight: 1, fontWeight: 300 }}>{expanded === i ? "−" : "+"}</div>
          </div>
          {expanded === i && (
            <div style={{ borderTop: "0.5px solid #EDEAE2", padding: "12px 14px", background: "#FAFAF8" }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
                <div style={{ background: "#fff", border: "0.5px solid #CECBF6", borderRadius: 8, padding: "10px 12px" }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#534AB7", marginBottom: 6 }}>Equity Compass v2.0</div>
                  <div style={{ fontSize: 11, color: "#444", lineHeight: 1.5, marginBottom: 6 }}>{row.v2.alloc}</div>
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 10, color: "#888" }}>Vol: <strong style={{ color: "#222" }}>{row.v2.vol}</strong></span>
                    <span style={{ fontSize: 10, color: "#A32D2D" }}>DD: <strong>{row.v2.drawdown}</strong></span>
                  </div>
                  {row.v2.edge && <div style={{ fontSize: 10, color: "#3B6D11", marginTop: 6, fontStyle: "italic" }}>+ {row.v2.edge}</div>}
                </div>
                <div style={{ background: "#fff", border: "0.5px solid #D3D1C7", borderRadius: 8, padding: "10px 12px" }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#5F5E5A", marginBottom: 6 }}>Equity Compass Lite</div>
                  <div style={{ fontSize: 11, color: "#444", lineHeight: 1.5, marginBottom: 6 }}>{row.lite.alloc}</div>
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 10, color: "#888" }}>Vol: <strong style={{ color: "#222" }}>{row.lite.vol}</strong></span>
                    <span style={{ fontSize: 10, color: "#A32D2D" }}>DD: <strong>{row.lite.drawdown}</strong></span>
                  </div>
                  {row.lite.note && <div style={{ fontSize: 10, color: "#888", marginTop: 6, fontStyle: "italic" }}>{row.lite.note}</div>}
                </div>
              </div>
              <div style={{ fontSize: 11, color: "#444", lineHeight: 1.55, padding: "8px 10px", background: "#fff", borderRadius: 6, border: "0.5px solid #EDEAE2" }}>
                <strong style={{ color: "#1A3A5C" }}>IC judgement:</strong> {row.verdictNote}
              </div>
            </div>
          )}
        </div>
      ))}

      <div style={{ marginTop: 16, border: "0.5px solid #E4E2DA", borderRadius: 10, overflow: "hidden" }}>
        <div style={{ padding: "10px 14px", background: "#1A3A5C" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#fff" }}>Overall IC verdict</div>
        </div>
        <div style={{ padding: "12px 14px", display: "flex", flexDirection: "column", gap: 8 }}>
          {[
            { label: "When v2.0 wins", text: LITE.overallVerdict.whenV2Wins,  bg: "#EAF3DE", lc: "#3B6D11" },
            { label: "When Lite wins", text: LITE.overallVerdict.whenLiteWins, bg: "#FAEEDA", lc: "#854F0B" },
            { label: "When similar",   text: LITE.overallVerdict.whenSimilar,  bg: "#F0EEE8", lc: "#5F5E5A" },
          ].map((row, i) => (
            <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
              <div style={{ minWidth: 92, fontSize: 10, fontWeight: 700, color: row.lc, background: row.bg, padding: "3px 7px", borderRadius: 4, textAlign: "center", flexShrink: 0 }}>{row.label}</div>
              <div style={{ fontSize: 11, color: "#444", lineHeight: 1.55 }}>{row.text}</div>
            </div>
          ))}
          <div style={{ marginTop: 4, fontSize: 11, color: "#1A3A5C", lineHeight: 1.6, fontStyle: "italic", padding: "8px 10px", background: "#F5F0FE", borderRadius: 6, border: "0.5px solid #CECBF6" }}>
            {LITE.overallVerdict.overallJudgement}
          </div>
        </div>
      </div>
      <div style={{ fontSize: 9, color: "#B4B2A9", marginTop: 12, lineHeight: 1.6 }}>
        Note: all drawdown estimates are illustrative ranges based on historical factor/sector behaviour. Not backtested performance.
      </div>
    </div>
  );
}

function RegimeView({ r }) {
  const cs = charStyles[r.character];
  return (
    <div>
      <div style={{ background: "#F5F7FA", borderRadius: 10, padding: "12px 14px", marginBottom: 14 }}>
        <div style={{ fontSize: 10, color: "#888", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8 }}>Macro context</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8 }}>
          {[
            { label: "Global PMI",   val: r.macro.pmi,   note: r.macro.pmiNote },
            { label: "CPI YoY",      val: r.macro.cpi,   note: r.macro.cpiNote },
            { label: "NFCI",         val: r.macro.nfci,  note: r.macro.nfciNote },
            { label: "Yield curve",  val: r.macro.curve, note: r.macro.curveNote },
          ].map((m, i) => (
            <div key={i}>
              <div style={{ fontSize: 9, color: "#94A3B8", marginBottom: 2 }}>{m.label}</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#1A3A5C" }}>{m.val}</div>
              <div style={{ fontSize: 9, color: "#888" }}>{m.note}</div>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", gap: 12, marginTop: 12 }}>
          <ScoreBar value={r.scores.growth} color="#1D9E75" label="Growth" />
          <ScoreBar value={r.scores.inflation} color="#D85A30" label="Inflation" />
          <ScoreBar value={r.scores.fci} color="#378ADD" label="FCI" />
        </div>
      </div>

      <div style={{ marginBottom: 10 }}><AllocationBar alloc={r.alloc} /></div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 14 }}>
        {r.alloc.filter(a => a.weight > 0).map((a, i) => (
          <span key={i} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11 }}>
            <span style={{ width: 9, height: 9, borderRadius: 2, background: a.color, display: "inline-block", flexShrink: 0 }} />
            <span style={{ color: "#444" }}>{a.etf}</span>
            <span style={{ color: "#94A3B8" }}>{a.weight}%</span>
          </span>
        ))}
      </div>

      <div style={{ background: "#fff", border: "0.5px solid #E4E2DA", borderRadius: 10, overflow: "hidden", marginBottom: 14 }}>
        {r.alloc.filter(a => a.weight > 0).map((a, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 14px", borderTop: i > 0 ? "0.5px solid #F5F3EF" : "none" }}>
            <span style={{ width: 8, height: 8, borderRadius: 2, background: a.color, display: "inline-block", flexShrink: 0 }} />
            <div style={{ fontSize: 11, color: "#94A3B8", minWidth: 56 }}>{a.sleeve}</div>
            <div style={{ fontSize: 13, fontWeight: 600, color: "#222", flex: 1 }}>{a.etf}</div>
            <div style={{ fontSize: 11, color: "#94A3B8", minWidth: 36 }}>{a.ticker}</div>
            {a.score
              ? <div style={{ fontSize: 11, fontWeight: 600, color: a.score >= 80 ? "#1D9E75" : a.score >= 65 ? "#BA7517" : "#888" }}>{a.score}</div>
              : <div style={{ fontSize: 11, color: "#94A3B8" }}>yield</div>}
            <div style={{ fontSize: 13, fontWeight: 700, color: a.color, minWidth: 34, textAlign: "right" }}>{a.weight}%</div>
          </div>
        ))}
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
        {[{ label: "Holdings", val: r.holdings }, { label: "Expected vol", val: r.vol }, { label: "Cash", val: r.cashPct }].map((s, i) => (
          <div key={i} style={{ flex: 1, background: "#F5F7FA", borderRadius: 8, padding: "8px 10px" }}>
            <div style={{ fontSize: 9, color: "#94A3B8", marginBottom: 3 }}>{s.label}</div>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#1A3A5C" }}>{s.val}</div>
          </div>
        ))}
        <div style={{ flex: 2, background: cs.bg, border: "0.5px solid " + cs.border, borderRadius: 8, padding: "8px 10px" }}>
          <div style={{ fontSize: 9, color: cs.color, marginBottom: 3, opacity: 0.7 }}>Character</div>
          <div style={{ fontSize: 13, fontWeight: 700, color: cs.color }}>{r.charLabel}</div>
        </div>
      </div>

      <div style={{ fontSize: 12, color: "#6B7B8D", lineHeight: 1.6, padding: "10px 12px", background: "#F5F7FA", borderRadius: 8, marginBottom: 14 }}>{r.logic}</div>

      <div style={{ border: "0.5px solid #EDEAE2", borderRadius: 8, padding: "10px 12px" }}>

        <div style={{ fontSize: 11, color: "#444", lineHeight: 1.5 }}>
          <strong style={{ color: "#A32D2D" }}>{r.drawdown.scenario}:</strong> {r.drawdown.estimate}
        </div>
        <div style={{ fontSize: 11, color: "#94A3B8", marginTop: 3 }}>vs. Equity Compass Lite: {r.drawdown.vsLite}</div>
      </div>
    </div>
  );
}

// ── App shell ──────────────────────────────────────────────────────

function App() {
  const [activeTab, setActiveTab] = useState("snapshot");
  const tabs = [
    { id: "snapshot", label: "📍 Current snapshot", isNew: true },
    { id: "lite",     label: "⚖️ Lite comparison" },
    ...regimes.map(r => ({ id: r.id, label: r.emoji + " " + r.name })),
  ];
  const selectedRegime = regimes.find(r => r.id === activeTab);

  return (
    <div style={{ fontFamily: "system-ui, -apple-system, sans-serif" }}>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20 }}>
        <div>
          <h1 style={{ fontSize: 22, fontWeight: 700, color: "#1A3A5C", margin: "0 0 3px" }}>Equity Compass</h1>
          <p style={{ fontSize: 12, color: "#6B7B8D", margin: 0 }}>Macro-filtered equity momentum rotation · v2.0 · Five-sleeve architecture</p>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 9, color: "#94A3B8", marginBottom: 2 }}>Strategy mandate</div>
          <div style={{ fontSize: 11, fontWeight: 600, color: "#534AB7" }}>Equity-dominant tactical</div>
          <div style={{ fontSize: 9, color: "#94A3B8" }}>Min 70% equity · UCITS</div>
        </div>
      </div>

      {/* Sleeve legend */}
      <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 18 }}>
        {sleeveOrder.map(sl => (
          <div key={sl} style={{ display: "flex", alignItems: "center", gap: 5, padding: "4px 9px", borderRadius: 5, background: "#F0EEE8", fontSize: 10, color: "#555" }}>
            <span style={{ width: 8, height: 8, borderRadius: 2, background: COLORS[sl.toLowerCase()], display: "inline-block", flexShrink: 0 }} />
            <strong>{sl}</strong>
            <span style={{ color: "#94A3B8" }}>
              {{ Anchor: "20-50%", Factor: "20-40%", Sector: "15-30%", Thematic: "0-15%", Cash: "0-30%" }[sl]}
            </span>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 20, borderBottom: "0.5px solid #E4E2DA", paddingBottom: 12 }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)}
            style={{ padding: "6px 13px", borderRadius: 6, border: activeTab === t.id ? "1.5px solid #7F77DD" : "0.5px solid #E4E2DA", background: activeTab === t.id ? "#F5F0FE" : "#fff", color: activeTab === t.id ? "#534AB7" : "#555", fontSize: 12, fontWeight: activeTab === t.id ? 700 : 400, cursor: "pointer", position: "relative" }}>
            {t.label}
            {t.isNew && activeTab !== t.id && (
              <span style={{ position: "absolute", top: -5, right: -5, background: "#D85A30", color: "#fff", fontSize: 8, padding: "1px 4px", borderRadius: 3, fontWeight: 700 }}>LIVE</span>
            )}
          </button>
        ))}
      </div>

      {/* Content */}
      {activeTab === "snapshot" ? <CurrentSnapshotView />
        : activeTab === "lite" ? <LiteComparisonView />
        : selectedRegime ? <RegimeView r={selectedRegime} />
        : null}

      {/* Footer */}
      <div style={{ fontSize: 9, color: "#C4C1B8", marginTop: 24, textAlign: "center", borderTop: "0.5px solid #EDEAE2", paddingTop: 14 }}>
        Equity Compass v2.0 · equity-dominant tactical UCITS ETF rotation with cash management · Draft for IC review · Not for distribution
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
