// ── Helpers ─────────────────────────────────────────────────────────────────
var h = React.createElement;

function div(style,children){return h("div",{style:style},children)}
function span(style,children){return h("span",{style:style},children)}

function el(tag,props){
  var kids = Array.prototype.slice.call(arguments,2);
  return h(tag,props,kids.length===1?kids[0]:kids.length?kids:null);
}

function allocBar(alloc){
  var total = alloc.reduce(function(s,a){return s+a.weight;},0);
  return h("div",{style:{display:"flex",height:28,borderRadius:6,overflow:"hidden",gap:1}},
    alloc.filter(function(a){return a.weight>0;}).map(function(a,i){
      return h("div",{key:i,title:a.sleeve+": "+a.etf+" "+a.weight+"%",
        style:{width:((a.weight/total)*100)+"%",background:a.color,display:"flex",
               alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",
               fontWeight:700,overflow:"hidden",whiteSpace:"nowrap",minWidth:0}},
        a.weight>=12?a.weight+"%":"");
    })
  );
}

function scoreBar(value,color,label){
  return h("div",{style:{flex:1}},
    h("div",{style:{fontSize:10,color:"#94A3B8",marginBottom:4}},label),
    h("div",{style:{height:5,background:"#EEECE6",borderRadius:3,overflow:"hidden"}},
      h("div",{style:{width:value+"%",height:"100%",background:color,borderRadius:3}})),
    h("div",{style:{fontSize:12,fontWeight:600,marginTop:3,color:color}},value)
  );
}

function statusBadge(status,label){
  var map={ok:["#EAF3DE","#3B6D11"],hot:["#FCEBEB","#A32D2D"],warn:["#FAEEDA","#854F0B"]};
  var s=map[status]||map.ok;
  return h("span",{style:{fontSize:10,padding:"2px 7px",borderRadius:4,fontWeight:600,background:s[0],color:s[1]}},label);
}

function trendBadge(trend){
  var map={
    on:        {bg:"#EAF3DE",color:"#3B6D11",border:"#C0DD97",label:"Trend ON",  icon:"✓"},
    off:       {bg:"#FCEBEB",color:"#A32D2D",border:"#F7C1C1",label:"Trend OFF", icon:"✗"},
    unverified:{bg:"#FAEEDA",color:"#854F0B",border:"#FAC775",label:"Unverified",icon:"?"}
  };
  var s=map[trend]||map.unverified;
  return h("span",{style:{display:"inline-flex",alignItems:"center",gap:3,fontSize:10,
    padding:"2px 7px",borderRadius:4,fontWeight:600,background:s.bg,color:s.color,
    border:"0.5px solid "+s.border,whiteSpace:"nowrap"}},s.icon+" "+s.label);
}

function verdictBadge(verdict,label){
  var map={
    v2wins: {bg:"#EAF3DE",color:"#3B6D11",border:"#C0DD97"},
    litewins:{bg:"#FAEEDA",color:"#854F0B",border:"#FAC775"},
    similar: {bg:"#F0EEE8",color:"#5F5E5A",border:"#D3D1C7"}
  };
  var s=map[verdict]||map.similar;
  return h("span",{style:{fontSize:10,padding:"2px 8px",borderRadius:4,fontWeight:600,
    background:s.bg,color:s.color,border:"0.5px solid "+s.border,whiteSpace:"nowrap"}},label);
}

function sectionLabel(text){
  return h("div",{style:{fontSize:10,color:"#888",fontWeight:600,textTransform:"uppercase",
    letterSpacing:"0.06em",marginBottom:8}},text);
}

          h("div",{style:{fontSize:11,fontWeight:600,paddingTop:1,

          h("div",{style:{minWidth:0}},

          ),
          h("div",{style:{fontSize:11,color:"#6B7B8D",lineHeight:1.45,paddingTop:1}},a.rationale)
        );
      }),
      h("div",{style:{fontSize:10,color:"#94A3B8",marginTop:10,paddingTop:8,borderTop:"0.5px solid #EDEAE2",lineHeight:1.5}},
        h("strong",{style:{color:"#5F5E5A"}},"Trend filter: "),snap.trendNote)
    ),
    // Watch items
    h("div",{style:{background:"#FAEEDA",borderRadius:8,padding:"12px 14px",marginBottom:14}},

}

function LiteView(){
  var React2=React;
  var expanded=React2.useState(null);
  var exp=expanded[0], setExp=expanded[1];
  var liteTotal=LITE.alloc.reduce(function(s,a){return s+a.weight;},0);
  return h("div",null,
    h("div",{style:{background:"#F5F7FA",border:"0.5px solid #E4E2DA",borderRadius:10,padding:"14px 16px",marginBottom:16}},
      sectionLabel("Equity Compass Lite — static construction"),
      h("div",{style:{display:"flex",height:22,borderRadius:5,overflow:"hidden",gap:1,marginBottom:10}},
        LITE.alloc.map(function(a,i){
          return h("div",{key:i,style:{width:((a.weight/liteTotal)*100)+"%",background:a.color,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",fontWeight:700}},a.weight+"%");
        })
      ),
      h("div",{style:{display:"flex",flexWrap:"wrap",gap:8,marginBottom:10}},
        LITE.alloc.map(function(a,i){
          return h("span",{key:i,style:{display:"flex",alignItems:"center",gap:5,fontSize:11}},
            h("span",{style:{width:8,height:8,borderRadius:2,background:a.color,display:"inline-block",flexShrink:0}}),
            h("strong",{style:{color:"#444"}},a.label),
            h("span",{style:{color:"#94A3B8"}},a.ticker+" · "+a.weight+"%"),
            a.note?h("em",{style:{color:"#B4B2A9",fontSize:10}},"("+a.note+")"):null
          );
        })
      ),
      h("div",{style:{fontSize:11,color:"#6B7B8D",marginBottom:10}},LITE.description),
      h("div",{style:{display:"flex",gap:8}},
        [{label:"Holdings",val:LITE.holdings},{label:"Est. turnover",val:LITE.turnover},{label:"Avg cost",val:LITE.cost}].map(function(s,i){
          return h("div",{key:i,style:{flex:1,background:"#fff",borderRadius:6,padding:"7px 10px",border:"0.5px solid #E4E2DA"}},
            h("div",{style:{fontSize:9,color:"#94A3B8",marginBottom:2}},s.label),
            h("div",{style:{fontSize:12,fontWeight:700,color:"#1A3A5C"}},s.val)
          );
        })
      ),
      h("div",{style:{fontSize:11,color:"#6B7B8D",marginTop:10,fontStyle:"italic"}},LITE.purpose)
    ),
    sectionLabel("Regime-by-regime comparison"),
    LITE.regimes.map(function(row,i){
      return h("div",{key:i,style:{border:"0.5px solid #E4E2DA",borderRadius:10,marginBottom:8,overflow:"hidden"}},
        h("div",{onClick:function(){setExp(exp===i?null:i);},
          style:{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",cursor:"pointer",
                 background:exp===i?"#FAFAF8":"#fff",userSelect:"none"}},
          h("div",{style:{fontSize:13,fontWeight:700,color:"#1A3A5C",flex:1}},row.emoji+" "+row.regime),
          verdictBadge(row.verdict,row.verdictLabel),
          h("div",{style:{fontSize:18,color:"#94A3B8",fontWeight:300}},exp===i?"−":"+")
        ),
        exp===i?h("div",{style:{borderTop:"0.5px solid #EDEAE2",padding:"12px 14px",background:"#FAFAF8"}},
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}},
            h("div",{style:{background:"#fff",border:"0.5px solid #CECBF6",borderRadius:8,padding:"10px 12px"}},
              h("div",{style:{fontSize:10,fontWeight:700,color:"#534AB7",marginBottom:6}},"Equity Compass v2.0"),
              h("div",{style:{fontSize:11,color:"#444",lineHeight:1.5,marginBottom:6}},row.v2.alloc),
              h("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
                h("span",{style:{fontSize:10,color:"#888"}},"Vol: ",h("strong",{style:{color:"#222"}},row.v2.vol)),
                h("span",{style:{fontSize:10,color:"#A32D2D"}},"DD: ",h("strong",null,row.v2.dd))
              ),
              row.v2.edge?h("div",{style:{fontSize:10,color:"#3B6D11",marginTop:6,fontStyle:"italic"}},"+ "+row.v2.edge):null
            ),
            h("div",{style:{background:"#fff",border:"0.5px solid #D3D1C7",borderRadius:8,padding:"10px 12px"}},
              h("div",{style:{fontSize:10,fontWeight:700,color:"#5F5E5A",marginBottom:6}},"Equity Compass Lite"),
              h("div",{style:{fontSize:11,color:"#444",lineHeight:1.5,marginBottom:6}},row.lite.alloc),
              h("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
                h("span",{style:{fontSize:10,color:"#888"}},"Vol: ",h("strong",{style:{color:"#222"}},row.lite.vol)),
                h("span",{style:{fontSize:10,color:"#A32D2D"}},"DD: ",h("strong",null,row.lite.dd))
              ),
              row.lite.note?h("div",{style:{fontSize:10,color:"#888",marginTop:6,fontStyle:"italic"}},row.lite.note):null
            )
          ),
          h("div",{style:{fontSize:11,color:"#444",lineHeight:1.55,padding:"8px 10px",background:"#fff",borderRadius:6,border:"0.5px solid #EDEAE2"}},
            h("strong",{style:{color:"#1A3A5C"}},"IC judgement: "),row.note)
        ):null
      );
    }),
    h("div",{style:{marginTop:16,border:"0.5px solid #E4E2DA",borderRadius:10,overflow:"hidden"}},
      h("div",{style:{padding:"10px 14px",background:"#1A3A5C"}},
        h("div",{style:{fontSize:11,fontWeight:700,color:"#fff"}},"Overall IC verdict")),
      h("div",{style:{padding:"12px 14px",display:"flex",flexDirection:"column",gap:8}},
        [{label:"When v2.0 wins",text:LITE.verdict.v2,  bg:"#EAF3DE",lc:"#3B6D11"},
         {label:"When Lite wins",text:LITE.verdict.lite, bg:"#FAEEDA",lc:"#854F0B"},
         {label:"When similar",  text:LITE.verdict.sim,  bg:"#F0EEE8",lc:"#5F5E5A"}
        ].map(function(row,i){
          return h("div",{key:i,style:{display:"flex",gap:10,alignItems:"flex-start"}},
            h("div",{style:{minWidth:92,fontSize:10,fontWeight:700,color:row.lc,background:row.bg,
              padding:"3px 7px",borderRadius:4,textAlign:"center",flexShrink:0}},row.label),
            h("div",{style:{fontSize:11,color:"#444",lineHeight:1.55}},row.text)
          );
        }),
        h("div",{style:{marginTop:4,fontSize:11,color:"#1A3A5C",lineHeight:1.6,fontStyle:"italic",
          padding:"8px 10px",background:"#F5F0FE",borderRadius:6,border:"0.5px solid #CECBF6"}},LITE.verdict.judge)
      )
    ),
    h("div",{style:{fontSize:9,color:"#B4B2A9",marginTop:12,lineHeight:1.6}},
      "Note: all drawdown estimates are illustrative ranges based on historical factor/sector behaviour. Not backtested performance.")
  );
}

function RegimeView(props){
  var r=props.r, cs=CS[r.character];
  return h("div",null,
    h("div",{style:{background:"#F5F7FA",borderRadius:10,padding:"12px 14px",marginBottom:14}},
      sectionLabel("Macro context"),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}},
        [{label:"Global PMI",val:r.macro.pmi,note:r.macro.pmiNote},
         {label:"CPI YoY",  val:r.macro.cpi,note:r.macro.cpiNote},
         {label:"NFCI",     val:r.macro.nfci,note:r.macro.nfciNote},
         {label:"Yield curve",val:r.macro.curve,note:r.macro.curveNote}
        ].map(function(m,i){
          return h("div",{key:i},
            h("div",{style:{fontSize:9,color:"#94A3B8",marginBottom:2}},m.label),
            h("div",{style:{fontSize:15,fontWeight:700,color:"#1A3A5C"}},m.val),
            h("div",{style:{fontSize:9,color:"#888"}},m.note)
          );
        })
      ),
      h("div",{style:{display:"flex",gap:12,marginTop:12}},
        scoreBar(r.scores.growth,"#1D9E75","Growth"),
        scoreBar(r.scores.inflation,"#D85A30","Inflation"),
        scoreBar(r.scores.fci,"#378ADD","FCI")
      )
    ),
    h("div",{style:{marginBottom:10}},allocBar(r.alloc)),
    h("div",{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}},
      r.alloc.filter(function(a){return a.weight>0;}).map(function(a,i){
        return h("span",{key:i,style:{display:"flex",alignItems:"center",gap:5,fontSize:11}},
          h("span",{style:{width:9,height:9,borderRadius:2,background:a.color,display:"inline-block",flexShrink:0}}),
          h("span",{style:{color:"#444"}},a.etf),
          h("span",{style:{color:"#94A3B8"}},a.weight+"%")
        );
      })
    ),
    h("div",{style:{background:"#fff",border:"0.5px solid #E4E2DA",borderRadius:10,overflow:"hidden",marginBottom:14}},
      r.alloc.filter(function(a){return a.weight>0;}).map(function(a,i){
        return h("div",{key:i,style:{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",
          borderTop:i>0?"0.5px solid #F5F3EF":"none"}},
          h("span",{style:{width:8,height:8,borderRadius:2,background:a.color,display:"inline-block",flexShrink:0}}),
          h("div",{style:{fontSize:11,color:"#94A3B8",minWidth:56}},a.sleeve),
          h("div",{style:{fontSize:13,fontWeight:600,color:"#222",flex:1}},a.etf),
          h("div",{style:{fontSize:11,color:"#94A3B8",minWidth:36}},a.ticker),
          a.score
            ?h("div",{style:{fontSize:11,fontWeight:600,color:a.score>=80?"#1D9E75":a.score>=65?"#BA7517":"#888"}},a.score)
            :h("div",{style:{fontSize:11,color:"#94A3B8"}},"yield"),
          h("div",{style:{fontSize:13,fontWeight:700,color:a.color,minWidth:34,textAlign:"right"}},a.weight+"%")
        );
      })
    ),
    h("div",{style:{display:"flex",gap:8,marginBottom:14}},
      [{label:"Holdings",val:r.holdings},{label:"Expected vol",val:r.vol},{label:"Cash",val:r.cashPct}].map(function(s,i){
        return h("div",{key:i,style:{flex:1,background:"#F5F7FA",borderRadius:8,padding:"8px 10px"}},
          h("div",{style:{fontSize:9,color:"#94A3B8",marginBottom:3}},s.label),
          h("div",{style:{fontSize:14,fontWeight:700,color:"#1A3A5C"}},s.val)
        );
      }),
      h("div",{style:{flex:2,background:cs.bg,border:"0.5px solid "+cs.border,borderRadius:8,padding:"8px 10px"}},
        h("div",{style:{fontSize:9,color:cs.color,marginBottom:3,opacity:0.7}},"Character"),
        h("div",{style:{fontSize:13,fontWeight:700,color:cs.color}},r.charLabel)
      )
    ),
    h("div",{style:{fontSize:12,color:"#6B7B8D",lineHeight:1.6,padding:"10px 12px",background:"#F5F7FA",borderRadius:8,marginBottom:14}},r.logic),
    h("div",{style:{border:"0.5px solid #EDEAE2",borderRadius:8,padding:"10px 12px"}},
      h("div",{style:{fontSize:10,color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}},"Honest drawdown expectation"),
      h("div",{style:{fontSize:11,color:"#444",lineHeight:1.5}},
        h("strong",{style:{color:"#A32D2D"}},r.drawdown.scenario+": "),r.drawdown.estimate),
      h("div",{style:{fontSize:11,color:"#94A3B8",marginTop:3}},"vs. Equity Compass Lite: "+r.drawdown.vsLite)
    )
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App(){
  var state=React.useState("snapshot");
  var activeTab=state[0], setTab=state[1];
  var tabs=[
    {id:"snapshot",label:"📍 Current snapshot",isNew:true},
    {id:"lite",    label:"⚖️ Lite comparison"}
  ].concat(REGIMES.map(function(r){return {id:r.id,label:r.emoji+" "+r.name};}));
  var reg=REGIMES.find(function(r){return r.id===activeTab;});

  return h("div",{style:{fontFamily:"system-ui,-apple-system,sans-serif"}},
    // Header
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}},
      h("div",null,
        h("h1",{style:{fontSize:22,fontWeight:700,color:"#1A3A5C",margin:"0 0 3px"}},"Equity Compass"),
        h("p",{style:{fontSize:12,color:"#6B7B8D",margin:0}},"Macro-filtered equity momentum rotation · v2.0 · Five-sleeve architecture")
      ),
      h("div",{style:{textAlign:"right"}},
        h("div",{style:{fontSize:9,color:"#94A3B8",marginBottom:2}},"Strategy mandate"),
        h("div",{style:{fontSize:11,fontWeight:600,color:"#534AB7"}},"Equity-dominant tactical"),
        h("div",{style:{fontSize:9,color:"#94A3B8"}},"Min 70% equity · UCITS")
      )
    ),
    // Sleeve legend
    h("div",{style:{display:"flex",gap:5,flexWrap:"wrap",marginBottom:18}},
      ["Anchor","Factor","Sector","Thematic","Cash"].map(function(sl){
        return h("div",{key:sl,style:{display:"flex",alignItems:"center",gap:5,padding:"4px 9px",borderRadius:5,background:"#F0EEE8",fontSize:10,color:"#555"}},
          h("span",{style:{width:8,height:8,borderRadius:2,background:C[sl.toLowerCase()],display:"inline-block",flexShrink:0}}),
          h("strong",null,sl),
          h("span",{style:{color:"#94A3B8"}},SLEEVE_RANGES[sl])
        );
      })
    ),
    // Tabs
    h("div",{style:{display:"flex",gap:4,flexWrap:"wrap",marginBottom:20,borderBottom:"0.5px solid #E4E2DA",paddingBottom:12}},
      tabs.map(function(t){
        var active=activeTab===t.id;
        return h("button",{key:t.id,onClick:function(){setTab(t.id);},
          style:{padding:"6px 13px",borderRadius:6,fontSize:12,fontWeight:active?700:400,
                 border:active?"1.5px solid #7F77DD":"0.5px solid #E4E2DA",
                 background:active?"#F5F0FE":"#fff",color:active?"#534AB7":"#555",
                 cursor:"pointer",position:"relative"}},
          t.label,
          t.isNew&&!active?h("span",{style:{position:"absolute",top:-5,right:-5,background:"#D85A30",color:"#fff",
            fontSize:8,padding:"1px 4px",borderRadius:3,fontWeight:700}},"LIVE"):null
        );
      })
    ),
    // Content
    activeTab==="snapshot"?h(SnapshotView,null):
    activeTab==="lite"    ?h(LiteView,null):
    reg                   ?h(RegimeView,{r:reg}):null,
    // Footer
    h("div",{style:{fontSize:9,color:"#C4C1B8",marginTop:24,textAlign:"center",borderTop:"0.5px solid #EDEAE2",paddingTop:14}},
      "Equity Compass v2.0 · equity-dominant tactical UCITS ETF rotation with cash management · Draft for IC review · Not for distribution")
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
